<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osmanlı Payitahtı - Erkek Sesli Akıllı Simülasyon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Times New Roman', serif; background: #050505; touch-action: none; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        
        #info-card {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            background: linear-gradient(180deg, rgba(30, 20, 10, 0.98) 0%, rgba(10, 5, 0, 0.99) 100%);
            border: 1px solid #d4af37;
            border-radius: 12px;
            color: #f3e5ab;
            padding: 20px;
            box-shadow: 0 15px 60px rgba(0,0,0,1);
            display: none;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .btn-gold {
            background: #5d1010;
            color: #f3e5ab;
            border: 1px solid #d4af37;
            padding: 10px 20px;
            font-variant: small-caps;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }
        .btn-gold:hover { background: #d4af37; color: #1a1005; }

        #timer-bar { width: 100%; height: 3px; background: rgba(212, 175, 55, 0.1); margin-top: 15px; border-radius: 2px; }
        #timer-fill { width: 0%; height: 100%; background: #d4af37; transition: width 0.1s linear; }

        .location-tag {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            padding: 2px 12px;
            border-radius: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #d4af37;
        }

        #gemini-chat {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(20, 15, 10, 0.9);
            border: 1px solid #d4af37;
            border-radius: 10px;
            padding: 15px;
            display: none;
            color: #f3e5ab;
        }

        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
            color: #f3e5ab;
            padding: 5px 10px;
            width: 100%;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 class="text-5xl mb-2 italic serif text-center">Payitaht-ı Cihan</h1>
        <p class="text-xl opacity-70 mb-10 font-light tracking-[0.3em] text-center">VAKUR SESLİ REHBERLİK</p>
        <button onclick="startApp()" class="btn-gold px-16 py-5 text-xl">DERSİ BAŞLAT</button>
    </div>

    <div id="ui-layer">
        <div id="gemini-chat" class="interactive">
            <h3 class="text-sm font-serif border-bottom border-[#d4af37] mb-2 opacity-70 italic">Tarihçiye Sor</h3>
            <div id="chat-output" class="text-xs mb-2 max-h-32 overflow-y-auto italic">Bu yapı hakkında merak ettiğiniz bir şey var mı?</div>
            <input type="text" id="chat-input" placeholder="Soru yazın..." onkeypress="handleChat(event)">
            <button onclick="askGemini()" class="btn-gold text-[10px] mt-2 w-full">✨ TARİHÇİYE DANIŞ</button>
        </div>

        <div id="info-card" class="interactive">
            <div class="flex justify-center mb-2"><span id="b-area" class="location-tag">Bölge</span></div>
            <h1 id="b-title" class="text-4xl font-serif mb-2 text-[#d4af37]">Mekan Adı</h1>
            <div class="text-lg leading-relaxed mb-6 font-light italic opacity-90" id="b-desc">...</div>
            
            <div class="flex justify-between items-center gap-6">
                <button onclick="prevStep()" class="text-3xl hover:text-white transition-colors">❮</button>
                <div class="text-xs tracking-widest uppercase opacity-50 font-serif">Osmanlı Mimarlık Tarihi</div>
                <button onclick="nextStep()" class="text-3xl hover:text-white transition-colors">❯</button>
            </div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ottoman-history-v2';

        const BUILDING_DATA = {
            "babihumayun": { name: "Bab-ı Hümayun", area: "Saray Girişi", desc: "Saray-ı Hümayun'un protokol kapısıdır. Halkın dilekçelerini sunduğu ve devletin görkemini hissettiği ilk büyük eşiktir.", pos: {x: 0, z: 120}, rad: 12, orbitDist: 50, height: 15 },
            "arzodasi": { name: "Arz Odası", area: "Topkapı Sarayı", desc: "Padişahın yabancı elçileri kabul ettiği, devlet ricali ile görüştüğü diplomasi merkezidir. Burası imparatorluğun dış dünyaya açılan yüzüdür.", pos: {x: 0, z: -40}, rad: 15, orbitDist: 40, height: 10 },
            "darphane": { name: "Darphane-i Amire", area: "Saray Yerleşkesi", desc: "Osmanlı altın ve gümüş sikkelerinin basıldığı, devletin mali gücünü temsil eden üretim merkezidir.", pos: {x: -60, z: 0}, rad: 18, orbitDist: 50, height: 15 },
            "ayasofya": { name: "Ayasofya-i Kebir", area: "Sultanahmet", desc: "Fethin en büyük nişanesidir. Mimar Sinan'ın eklediği minareler ve destek duvarlarıyla Osmanlı üslubuyla harmanlanmış şaheserdir.", pos: {x: 0, z: 250}, rad: 40, orbitDist: 120, height: 60 },
            "suleymaniye": { name: "Süleymaniye Camii", area: "Vefa Tepesi", desc: "Mimar Sinan'ın kalfalık eserim dediği, Kanuni Sultan Süleyman adına inşa edilen, şehrin silüetini belirleyen devasa külliyedir.", pos: {x: 220, z: 150}, rad: 45, orbitDist: 150, height: 70 },
            "galata": { name: "Galata Kulesi", area: "Pera Yakası", desc: "Şehrin en eski yapılarından olup Osmanlı döneminde yangın gözetleme kulesi ve zindan olarak kullanılmıştır.", pos: {x: 250, z: -200}, rad: 10, orbitDist: 80, height: 60 },
            "kapalicarsi": { name: "Kapalıçarşı", area: "Beyazıt", desc: "Dünyanın en eski ve en büyük alışveriş merkezlerinden biridir. Ticaretin nabzı yüzyıllardır burada atar.", pos: {x: 150, z: 350}, rad: 30, orbitDist: 80, height: 25 },
            "sultanahmet": { name: "Sultan Ahmed Camii", area: "Meydan", desc: "6 minaresi ve mavi İznik çinileriyle meşhurdur. Klasik Osmanlı cami mimarisinin en zarif örneklerinden biri kabul edilir.", pos: {x: -180, z: 350}, rad: 35, orbitDist: 130, height: 50 }
        };

        const TOUR_KEYS = Object.keys(BUILDING_DATA);
        let scene, camera, renderer, clock, tourActive = false, currentStep = 0, isSpeaking = false, timerStart = 0, angle = 0;

        // PCM to WAV Helper
        function createWavHeader(sampleRate, numChannels, dataLength) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * 2, true);
            view.setUint16(32, numChannels * 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, dataLength, true);
            return new Uint8Array(buffer);
        }

        async function speak(text) {
            if (isSpeaking) return;
            isSpeaking = true;
            document.getElementById('timer-fill').style.width = '0%';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Vakur ve bilge bir erkek sesiyle oku: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                const result = await response.json();
                const base64Audio = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                
                if (base64Audio) {
                    const binaryString = atob(base64Audio);
                    const len = binaryString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);

                    const wavHeader = createWavHeader(24000, 1, len);
                    const fullWav = new Uint8Array(wavHeader.length + bytes.length);
                    fullWav.set(wavHeader);
                    fullWav.set(bytes, wavHeader.length);

                    const blob = new Blob([fullWav], { type: 'audio/wav' });
                    const audio = new Audio(URL.createObjectURL(blob));
                    audio.onended = () => {
                        isSpeaking = false;
                        timerStart = Date.now();
                        runTimer();
                    };
                    audio.play();
                } else {
                    isSpeaking = false; // Fallback
                }
            } catch (e) {
                isSpeaking = false;
            }
        }

        async function callGemini(prompt) {
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Sen bilge bir Osmanlı tarihçisisin. Erkek bir sesle cevap verecekmiş gibi etkileyici bir dille konuş." }] }
            };
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return "Zihnim bulandı evlat."; }
        }

        async function askGemini() {
            const input = document.getElementById('chat-input');
            const output = document.getElementById('chat-output');
            const q = input.value.trim();
            if(!q) return;
            input.value = "";
            output.innerText = "Düşünüyorum...";
            const answer = await callGemini(`${BUILDING_DATA[TOUR_KEYS[currentStep]].name} hakkında: ${q}`);
            output.innerText = answer;
            speak(answer);
        }

        function handleChat(e) { if(e.key === 'Enter') askGemini(); }

        function startApp() {
            document.getElementById('intro-overlay').style.display = 'none';
            init();
            toggleTour();
            document.getElementById('gemini-chat').style.display = 'block';
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050402);
            scene.fog = new THREE.Fog(0x050402, 100, 800);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            scene.add(new THREE.AmbientLight(0xfff0d0, 0.5));
            const sun = new THREE.DirectionalLight(0xffe5b4, 1.2);
            sun.position.set(200, 400, 100);
            scene.add(sun);
            createCity();
            window.addEventListener('resize', onResize);
            animate();
        }

        function createCity() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshPhongMaterial({ color: 0x110e0a }));
            ground.rotation.x = -Math.PI/2; scene.add(ground);
            Object.entries(BUILDING_DATA).forEach(([key, data]) => {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(data.rad*1.8, 15, data.rad*1.8), new THREE.MeshPhongMaterial({color: 0x664433}));
                body.position.y = 7.5; group.add(body);
                if(key.includes("cami") || key === "ayasofya") {
                    const dome = new THREE.Mesh(new THREE.SphereGeometry(data.rad, 32, 16, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshPhongMaterial({color: 0x4a5a6a}));
                    dome.position.y = 15; group.add(dome);
                }
                group.position.set(data.pos.x, 0, data.pos.z); scene.add(group);
            });
        }

        function toggleTour() { currentStep = 0; tourActive = true; startTourStep(); }

        function startTourStep() {
            const data = BUILDING_DATA[TOUR_KEYS[currentStep]];
            document.getElementById('info-card').style.display = 'block';
            document.getElementById('b-title').innerText = data.name;
            document.getElementById('b-area').innerText = data.area;
            document.getElementById('b-desc').innerText = data.desc;
            speak(`${data.name}. ${data.desc}`);
        }

        function runTimer() {
            if(!tourActive || isSpeaking) return;
            const elapsed = Date.now() - timerStart;
            const progress = (elapsed / 15000) * 100;
            document.getElementById('timer-fill').style.width = Math.min(100, progress) + "%";
            if(progress < 100) requestAnimationFrame(runTimer);
            else nextStep();
        }

        function nextStep() { currentStep = (currentStep + 1) % TOUR_KEYS.length; startTourStep(); }
        function prevStep() { currentStep = (currentStep - 1 + TOUR_KEYS.length) % TOUR_KEYS.length; startTourStep(); }

        function animate() {
            requestAnimationFrame(animate);
            if(tourActive) {
                const data = BUILDING_DATA[TOUR_KEYS[currentStep]];
                angle += clock.getDelta() * 0.15;
                camera.position.lerp(new THREE.Vector3(data.pos.x + Math.cos(angle)*data.orbitDist, data.height, data.pos.z + Math.sin(angle)*data.orbitDist), 0.05);
                camera.lookAt(data.pos.x, 10, data.pos.z);
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
